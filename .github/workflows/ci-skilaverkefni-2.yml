name: CI - Skilaverkefni 2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: skilaverkefni-2/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: skilaverkefni-2
      - run: npm test
        working-directory: skilaverkefni-2

  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: skilaverkefni-2/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: skilaverkefni-2
      - run: npm run build
        working-directory: skilaverkefni-2
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: skilaverkefni-2
          start: npm run preview
          wait-on: 'http://localhost:4173'